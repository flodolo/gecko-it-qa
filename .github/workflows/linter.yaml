name: Spellcheck
on:
  push:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:
jobs:
  spellcheck:
    name: Check spelling
    runs-on: ubuntu-latest
    steps:
      - name: Clone l10n repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          path: "linter"
      - name: Install packages
        run: |
          sudo apt update
          sudo apt install -y python-dev-is-python3 libhunspell-dev mercurial
      - name: Set up Python 3
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.12'
      - name: Set up uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true
          version: "0.8.11"
      - name: Clone it folder from firefox-l10n
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: mozilla-l10n/firefox-l10n
          path: l10n
          sparse-checkout: |
            it
      - name: Run checks
        run: |
          # Set up config
          echo "[default]" > linter/config/config.ini
          echo "repo_path = $PWD/l10n/it" >> linter/config/config.ini

          # Run checks
          ./linter/scripts/check_strings.sh
